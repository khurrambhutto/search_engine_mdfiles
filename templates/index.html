<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    min-height: 100vh;
  }
  .container { width: 100%; max-width: 700px; }

  h1 {
    font-size: 1.6rem; font-weight: 600; margin-bottom: 24px;
    color: #f0f6fc;
  }
  h1 span { color: #58a6ff; margin-right: 8px; }

  .config {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .config label {
    display: block; font-size: 0.75rem; color: #8b949e;
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .config-row { display: flex; gap: 10px; }
  .config-row input {
    flex: 1;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px 12px;
    color: #c9d1d9;
    font-size: 0.9rem;
    outline: none;
  }
  .config-row input:focus { border-color: #58a6ff; }
  .btn {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px 14px;
    color: #c9d1d9;
    cursor: pointer;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .btn:hover { background: #30363d; }
  .btn-primary {
    background: #238636; border-color: #2ea043; color: #fff;
  }
  .btn-primary:hover { background: #2ea043; }

  .search-bar {
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .search-bar input {
    flex: 1;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 16px;
    color: #c9d1d9;
    font-size: 1rem;
    outline: none;
  }
  .search-bar input:focus { border-color: #58a6ff; }
  .search-bar input::placeholder { color: #484f58; }
  .btn-search {
    background: #1f6feb;
    border: 1px solid #388bfd;
    border-radius: 8px;
    padding: 12px 24px;
    color: #fff;
    cursor: pointer;
    font-size: 0.95rem;
    white-space: nowrap;
  }
  .btn-search:hover { background: #388bfd; }
  .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

  .mode-toggle {
    display: flex; gap: 0; margin-bottom: 20px;
    border: 1px solid #30363d; border-radius: 8px; overflow: hidden;
    width: fit-content;
  }
  .mode-toggle button {
    padding: 6px 18px; font-size: 0.85rem;
    background: #161b22; border: none; color: #8b949e; cursor: pointer;
    border-right: 1px solid #30363d;
  }
  .mode-toggle button:last-child { border-right: none; }
  .mode-toggle button.active { background: #1f6feb; color: #fff; }
  .mode-toggle button:hover:not(.active) { background: #21262d; }

  .bm25-params {
    display: flex; gap: 20px; margin-bottom: 20px;
  }
  .param { display: flex; flex-direction: column; gap: 4px; }
  .param label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; }
  .param input {
    width: 72px;
    background: #0d1117; border: 1px solid #30363d;
    border-radius: 6px; padding: 6px 10px; color: #c9d1d9;
    font-size: 0.85rem; outline: none;
  }
  .param input:focus { border-color: #58a6ff; }

  .stats {
    display: flex; gap: 12px; margin-bottom: 20px;
    font-size: 0.75rem; color: #8b949e;
  }
  .stats span { background: #161b22; border-radius: 6px; padding: 4px 10px; }

  .results { display: flex; flex-direction: column; gap: 8px; }
  .result {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px;
  }
  .result:hover { border-color: #58a6ff; }
  .result .file-name {
    color: #58a6ff; font-size: 0.95rem; word-break: break-all;
    flex: 1;
  }
  .result .score {
    background: #0d1117; color: #7ee787; font-size: 0.8rem;
    padding: 4px 10px; border-radius: 6px; font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .empty {
    text-align: center; padding: 48px 0; color: #484f58;
  }
  .empty .icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.3; }

  .error {
    background: #490202; border: 1px solid #7d1a1a;
    color: #f85149; padding: 12px 16px; border-radius: 8px;
    margin-bottom: 20px; font-size: 0.9rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.5s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="container">
  <h1><span>&#x1F50D;</span> Markdown Search</h1>

  <div class="config">
    <label>Folder path</label>
    <div class="config-row">
      <input type="text" id="folder" placeholder="/path/to/your/markdown/files" />
      <button class="btn btn-primary" id="reindex">&#x21BB; Index</button>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="query" placeholder="Search across your markdown files..."
           autofocus autocomplete="off" />
    <button class="btn-search" id="search-btn">Search</button>
  </div>

  <div class="mode-toggle">
    <button data-mode="tfidf" class="active">TF-IDF</button>
    <button data-mode="bm25">BM25</button>
  </div>

  <div class="bm25-params" id="bm25-params" style="display:none">
    <div class="param">
      <label>k1</label>
      <input type="number" id="k1" value="1.5" step="0.1" min="0" max="5" />
    </div>
    <div class="param">
      <label>b</label>
      <input type="number" id="b" value="0.75" step="0.05" min="0" max="1" />
    </div>
  </div>

  <div class="stats" id="stats" style="display:none"></div>
  <div class="error" id="error" style="display:none"></div>

  <div class="results" id="results">
    <div class="empty">
      <div class="icon">&#x1F4C4;</div>
      <p>Set a folder and click Index, then search.</p>
    </div>
  </div>
</div>

<script>
  let mode = 'tfidf';

  document.querySelectorAll('.mode-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      mode = btn.dataset.mode;
      document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('bm25-params').style.display = mode === 'bm25' ? 'flex' : 'none';
    });
  });

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError() { document.getElementById('error').style.display = 'none'; }

  function renderResults(data) {
    document.getElementById('stats').style.display = 'flex';
    document.getElementById('stats').innerHTML = [
      `<span>Docs: ${data.total_docs}</span>`,
      `<span>Terms: ${data.vocab_size}</span>`,
      `<span>Mode: ${data.mode}</span>`,
    ].join('');

    const resultsEl = document.getElementById('results');
    if (!data.results.length) {
      resultsEl.innerHTML = `<div class="empty">
        <div class="icon">&#x1F50E;</div>
        <p>No matches found.</p>
      </div>`;
      return;
    }
    resultsEl.innerHTML = data.results.map(r =>
      `<div class="result">
        <span class="file-name">${escapeHtml(r.file)}</span>
        <span class="score">${r.score.toFixed(4)}</span>
      </div>`
    ).join('');
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  async function doSearch() {
    const query = document.getElementById('query').value.trim();
    const folder = document.getElementById('folder').value.trim();
    if (!query) return;
    if (!folder) { showError('Set a folder path and index first.'); return; }

    hideError();
    const btn = document.getElementById('search-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Searching';
    btn.classList.add('searching');

    try {
      const body = {
        query, folder, mode,
        k1: parseFloat(document.getElementById('k1').value) || 1.5,
        b: parseFloat(document.getElementById('b').value) || 0.75,
        top_k: 10,
      };
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) { showError(data.error); } else { renderResults(data); }
    } catch (err) {
      showError('Connection error: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Search';
    }
  }

  async function doReindex() {
    const folder = document.getElementById('folder').value.trim();
    if (!folder) { showError('Enter a folder path first.'); return; }
    hideError();

    const btn = document.getElementById('reindex');
    btn.disabled = true;
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span>Indexing';
    btn.classList.add('indexing');

    try {
      await fetch('/api/reindex', { method: 'POST' });
      document.getElementById('results').innerHTML = `<div class="empty">
        <div class="icon">&#x1F4C4;</div>
        <p>Ready. Type a query and press Search.</p>
      </div>`;
      document.getElementById('stats').style.display = 'none';
      document.getElementById('query').focus();
    } catch (err) {
      showError('Index failed: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = orig;
    }
  }

  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('reindex').addEventListener('click', doReindex);
  document.getElementById('query').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
  document.getElementById('folder').addEventListener('keydown', e => {
    if (e.key === 'Enter') doReindex();
  });
</script>
</body>
</html>
